    <title>My Links</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
            transition: 0.4s;
            overflow: hidden;
        }
        
        .dark {
            color: white;
        }
        
        .light {
            color: black;
        }
        /* الفيديو */
        
        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }
        /* طبقة تغميق */
        
        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }
        
        .light .overlay {
            background: rgba(255, 255, 255, 0.4);
        }
        
        .container {
            margin-top: 60px;
        }
        
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #00adb5;
            object-fit: cover;
        }
        
        .link {
            display: block;
            margin: 12px auto;
            padding: 15px;
            width: 280px;
            border-radius: 12px;
            text-decoration: none;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            transition: 0.3s;
        }
        
        .light .link {
            background: rgba(255, 255, 255, 0.7);
            color: black;
        }
        
        .link:hover {
            transform: scale(1.08);
            background: #00adb5;
        }
        
        .toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .copy {
            margin-top: 20px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .toggle,
        .soundBtn {
            position: fixed;
            top: 20px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .toggle {
            right: 20px;
        }
        
        .soundBtn {
            left: 20px;
        }
    </style>
</head>

    <script>
        function toggleMode() {
            document.body.classList.toggle("dark");
            document.body.classList.toggle("light");

            const darkVideo = document.getElementById("darkVideo");
            const lightVideo = document.getElementById("lightVideo");

            if (document.body.classList.contains("light")) {
                darkVideo.style.display = "none";
                lightVideo.style.display = "block";
            } else {
                darkVideo.style.display = "block";
                lightVideo.style.display = "none";
            }
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
